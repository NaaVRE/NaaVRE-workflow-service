name: Collect tests

on:
  workflow_call:
    inputs:
      runs-on:
        default: ubuntu-latest
        type: string
      pytest_extra_options:
        default: ""
        type: string
env:
  DEBUG: ${{ inputs.debug }}

jobs:
  collect-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
    steps:
      - uses: actions/checkout@v6

      - name: pytest
        shell: bash -l {0}
        run: |
          pip install pytest
          pip install -r requirements.txt
          pytest --collect-only -q app/tests
          pytest --collect-only -q app/tests | grep 'tests/' | sed 's/\([^:]*\)::\([^[]*\)\(\[.*\]\)\?/{"fullname": "\0", "module": "\1", "test": "\2", "parameter": "\3"}/g' | jq -s . > test_list.json
          cat test_list.json

      - name: Upload pytest output as artifact
        uses: actions/upload-artifact@v4
        with:
          name: test_list
          path: test_list.json
